spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/filestorage
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080

file:
  storage:
    path: ./uploads

logging:
  level:
    org.hibernate.SQL: DEBUG